site_name: XYZ / PhantomBlock
site_description: Preserved defensive firmware-assessment prototype in portfolio incubation
repo_url: https://github.com/aevespers2/Misc
repo_name: aevespers2/Misc
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Start Here:
      - Overview: index.md
      - Incubation Status: incubation-status.md
      - Safe Onboarding: onboarding.md
  - Design:
      - Why XYZ Exists: purpose.md
      - Architecture and Trust Boundaries: architecture.md
      - Threat Model: threat-model.md
      - Extensions: extensions.md
  - Development and Evidence:
      - Developer Guide: developer-guide.md
      - Validation Roadmap: validation.md
      - Compliance Center: compliance.md
  - Controlled Operations:
      - Deployment Boundary: deployment.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
