site_name: XYZ
site_description: Defensive firmware, hardware integrity, and out-of-band assessment platform
repo_url: https://github.com/aevespers2/Misc
repo_name: aevespers2/Misc
docs_dir: docs
site_dir: site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

nav:
  - Overview: index.md
  - Why XYZ Exists: purpose.md
  - Architecture: architecture.md
  - Threat Model: threat-model.md
  - Deployment: deployment.md
  - Extensions: extensions.md
  - Validation Roadmap: validation.md
  - Compliance Center: compliance.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
