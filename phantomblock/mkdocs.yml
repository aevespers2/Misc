site_name: XYZ / PhantomBlock Prototype
site_description: Incubation documentation for an unaccepted defensive firmware-assessment prototype
repo_url: https://github.com/aevespers2/Misc
repo_name: aevespers2/Misc
docs_dir: docs
site_dir: site

# Publication is controlled separately by the repository-level fail-closed
# GitHub Pages workflow and release.md. A successful documentation build does
# not authorize deployment or release.

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Project:
      - Status and scope: index.md
      - Why the prototype exists: purpose.md
      - Repository boundaries: repository-boundaries.md
      - Portable host-observation role: portable-host-observation.md
      - JusticeForMe overlap: host-observation-overlap.md
      - Obstruction and gluing analysis: obstruction-and-gluing.md
      - Incubation exit and migration: incubation-exit-and-migration.md
      - Ownership and release: ownership-and-release.md
  - Engineering:
      - Architecture: architecture.md
      - Design contracts: design-contracts.md
      - Threat model: threat-model.md
      - Extensions: extensions.md
  - Development:
      - Developer onboarding: developer-onboarding.md
      - Validation roadmap: validation.md
      - Deployment review: deployment.md
      - Compliance planning: compliance.md

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
