name: PhantomBlock CI

on:
  pull_request:
    paths:
      - 'phantomblock/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'punchlist.md'
      - '.github/workflows/phantomblock-ci.yml'
  push:
    branches: [main]
    paths:
      - 'phantomblock/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'punchlist.md'
      - '.github/workflows/phantomblock-ci.yml'

permissions:
  contents: read

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phantomblock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: phantomblock/pyproject.toml
      - name: Install development and documentation dependencies
        run: python -m pip install -e '.[dev,docs]'
      - name: Lint source and tests
        run: ruff check src tests
      - name: Run unit tests
        run: pytest -q
      - name: Build documentation with strict checks
        run: mkdocs build --strict
