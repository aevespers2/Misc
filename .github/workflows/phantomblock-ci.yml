name: PhantomBlock CI

on:
  pull_request:
    paths:
      - 'phantomblock/src/**'
      - 'phantomblock/tests/**'
      - 'phantomblock/pyproject.toml'
      - '.github/workflows/phantomblock-ci.yml'
  push:
    branches: [main]
    paths:
      - 'phantomblock/src/**'
      - 'phantomblock/tests/**'
      - 'phantomblock/pyproject.toml'
      - '.github/workflows/phantomblock-ci.yml'

permissions:
  contents: read

concurrency:
  group: phantomblock-ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: '1'
    defaults:
      run:
        working-directory: phantomblock

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Initialize evidence and assert clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git -C .. rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git -C .. status --porcelain)"
          evidence="$RUNNER_TEMP/phantomblock-ci"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } > "$evidence/source-identity.txt"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: ''

      - name: Install pinned validation toolchain
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/phantomblock-ci"
          python -m pip install \
            pip==25.1.1 \
            setuptools==80.9.0 \
            wheel==0.45.1 \
            pytest==8.4.2 \
            ruff==0.6.9 \
            > "$evidence/install.log" 2>&1
          status=$?
          if [ "$status" -eq 0 ]; then
            python -m pip install -e '.[dev]' --no-build-isolation \
              >> "$evidence/install.log" 2>&1
            status=$?
          fi
          cat "$evidence/install.log"
          printf '%s\n' "$status" > "$evidence/install-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Lint source and tests
        id: lint
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/phantomblock-ci"
          ruff check src tests > "$evidence/ruff.log" 2>&1
          status=$?
          cat "$evidence/ruff.log"
          printf '%s\n' "$status" > "$evidence/ruff-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run unit tests
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/phantomblock-ci"
          pytest -q --junitxml="$evidence/pytest.xml" \
            > "$evidence/pytest.log" 2>&1
          status=$?
          cat "$evidence/pytest.log"
          printf '%s\n' "$status" > "$evidence/pytest-exit-code.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/phantomblock-ci"
          python --version > "$evidence/python-version.txt" 2>&1
          ruff --version > "$evidence/ruff-version.txt" 2>&1 || true
          pytest --version > "$evidence/pytest-version.txt" 2>&1 || true
          python -m pip freeze --all > "$evidence/resolved-environment.txt" 2>&1 || true
          git -C .. status --porcelain --untracked-files=all > "$evidence/post-validation-status.txt"
          sha256sum \
            pyproject.toml \
            ../.github/workflows/phantomblock-ci.yml \
            > "$evidence/input-sha256.txt"
          git -C .. diff --exit-code
          git -C .. diff --cached --exit-code

      - name: Upload exact-head evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phantomblock-ci-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/phantomblock-ci
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on incomplete validation
        if: always()
        env:
          INSTALL_STATUS: ${{ steps.install.outputs.status }}
          LINT_STATUS: ${{ steps.lint.outputs.status }}
          TEST_STATUS: ${{ steps.tests.outputs.status }}
        shell: bash
        run: |
          set -euo pipefail
          test "$INSTALL_STATUS" = '0'
          test "$LINT_STATUS" = '0'
          test "$TEST_STATUS" = '0'
