name: PhantomBlock CI

on:
  pull_request:
    paths:
      - 'phantomblock/**'
      - '.github/workflows/phantomblock-ci.yml'
  push:
    branches: [main]
    paths:
      - 'phantomblock/**'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phantomblock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: phantomblock/pyproject.toml
      - run: python -m pip install -e '.[dev]'
      - run: ruff check src tests
      - run: pytest -q
