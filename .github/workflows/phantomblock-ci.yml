name: PhantomBlock CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'phantomblock/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'punchlist.md'
      - '.github/workflows/phantomblock-ci.yml'
  push:
    branches: [main]
    paths:
      - 'phantomblock/**'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'taskchain.md'
      - 'release.md'
      - 'changelog.md'
      - 'punchlist.md'
      - '.github/workflows/phantomblock-ci.yml'

permissions:
  contents: read

concurrency:
  group: phantomblock-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: phantomblock
    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Assert exact source identity
        shell: bash
        env:
          EXPECTED_HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p reports/ci
          actual="$(git -C .. rev-parse HEAD)"
          test "$actual" = "$EXPECTED_HEAD"
          printf '%s\n' "$actual" | tee reports/ci/exact-head.txt

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: phantomblock/pyproject.toml

      - name: Install development and documentation dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e '.[dev,docs]' 2>&1 | tee reports/ci/install.txt

      - name: Lint source and tests
        shell: bash
        run: |
          set -euo pipefail
          ruff check src tests 2>&1 | tee reports/ci/ruff.txt

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          pytest -q --junitxml=reports/ci/pytest.xml 2>&1 | tee reports/ci/pytest.txt

      - name: Build documentation with strict checks
        shell: bash
        run: |
          set -euo pipefail
          mkdocs build --strict 2>&1 | tee reports/ci/mkdocs.txt

      - name: Record deterministic evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p reports/ci
          python --version > reports/ci/python-version.txt 2>&1
          python -m pip freeze > reports/ci/dependencies.txt 2>&1
          if [ -d site ]; then
            tar --sort=name \
                --mtime='UTC 1970-01-01' \
                --owner=0 --group=0 --numeric-owner \
                -czf reports/ci/site.tar.gz site
          fi
          python - <<'PY'
          from hashlib import sha256
          from pathlib import Path

          root = Path('reports/ci')
          lines = []
          for path in sorted(root.rglob('*')):
              if not path.is_file() or path.name == 'SHA256SUMS':
                  continue
              digest = sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.relative_to(root).as_posix()}")
          (root / 'SHA256SUMS').write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: phantomblock-ci-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: phantomblock/reports/ci
          if-no-files-found: error
          retention-days: 30
