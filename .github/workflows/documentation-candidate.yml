name: Misc Documentation Candidate

on:
  pull_request:
    paths:
      - "README.md"
      - "taskchain.md"
      - "release.md"
      - "punchlist.md"
      - "changelog.md"
      - "phantomblock/docs/**"
      - "phantomblock/mkdocs.yml"
      - "phantomblock/pyproject.toml"
      - "scripts/check_documentation_candidate.py"
      - "tests/test_documentation_candidate.py"
      - ".github/workflows/documentation-candidate.yml"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: misc-documentation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-documentation:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUBMITTED_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Check out exact submitted source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ env.SUBMITTED_SHA }}
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: ""

      - name: Assert immutable clean source
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SUBMITTED_SHA"
          test -z "$(git status --porcelain)"
          evidence="$RUNNER_TEMP/misc-documentation-evidence"
          mkdir -p "$evidence"
          {
            printf 'repository=%s\n' "$GITHUB_REPOSITORY"
            printf 'source_sha=%s\n' "$SUBMITTED_SHA"
            printf 'workflow_run=%s\n' "$GITHUB_RUN_ID"
            printf 'workflow_attempt=%s\n' "$GITHUB_RUN_ATTEMPT"
          } | tee "$evidence/source-identity.txt"

      - name: Validate documentation structure and governance
        id: validator
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/misc-documentation-evidence"
          python scripts/check_documentation_candidate.py \
            > "$evidence/documentation-report.json" \
            2> "$evidence/documentation-errors.txt"
          status=$?
          cat "$evidence/documentation-report.json" || true
          cat "$evidence/documentation-errors.txt" >&2 || true
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run hostile regressions
        id: regressions
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/misc-documentation-evidence"
          python -m unittest tests.test_documentation_candidate -v \
            > "$evidence/regressions.txt" 2>&1
          status=$?
          cat "$evidence/regressions.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Install documentation dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/misc-documentation-evidence"
          python -m pip install --disable-pip-version-check \
            'mkdocs>=1.6,<2' 'mkdocs-material>=9.5,<10' \
            > "$evidence/install.txt" 2>&1
          status=$?
          cat "$evidence/install.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Build strict documentation
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set +e
          evidence="$RUNNER_TEMP/misc-documentation-evidence"
          (
            cd phantomblock
            mkdocs build --strict --site-dir "$RUNNER_TEMP/misc-documentation-site"
          ) > "$evidence/mkdocs-build.txt" 2>&1
          status=$?
          cat "$evidence/mkdocs-build.txt"
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record deterministic inputs and clean tree
        shell: bash
        run: |
          set -euo pipefail
          evidence="$RUNNER_TEMP/misc-documentation-evidence"
          sha256sum \
            README.md taskchain.md release.md punchlist.md changelog.md \
            phantomblock/mkdocs.yml \
            phantomblock/docs/index.md \
            phantomblock/docs/incubation-status.md \
            phantomblock/docs/architecture.md \
            phantomblock/docs/onboarding.md \
            phantomblock/docs/developer-guide.md \
            scripts/check_documentation_candidate.py \
            tests/test_documentation_candidate.py \
            .github/workflows/documentation-candidate.yml \
            .github/workflows/pages.yml \
            > "$evidence/input-sha256.txt"
          git diff --exit-code
          git diff --cached --exit-code
          test -z "$(git status --porcelain)"

      - name: Upload retained exact-head evidence
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        with:
          name: misc-documentation-${{ env.SUBMITTED_SHA }}
          path: ${{ runner.temp }}/misc-documentation-evidence
          if-no-files-found: error
          retention-days: 30

      - name: Fail closed on incomplete validation
        shell: bash
        env:
          VALIDATOR_STATUS: ${{ steps.validator.outputs.status }}
          REGRESSION_STATUS: ${{ steps.regressions.outputs.status }}
          INSTALL_STATUS: ${{ steps.install.outputs.status }}
          BUILD_STATUS: ${{ steps.build.outputs.status }}
        run: |
          set -euo pipefail
          test "$VALIDATOR_STATUS" = "0"
          test "$REGRESSION_STATUS" = "0"
          test "$INSTALL_STATUS" = "0"
          test "$BUILD_STATUS" = "0"
